<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback — Rotaract Club</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #c9a84c;
  --bg: #080a0f;
  --text: #e8e0d0;
  --border: rgba(255,255,255,0.1);
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  cursor: none;
}

/* CUSTOM CURSOR */
#cur {
  width:10px;
  height:10px;
  background:var(--gold);
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
}

#cur-r {
  width:30px;
  height:30px;
  border:1px solid var(--gold);
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:9998;
  transform:translate(-50%,-50%);
}

/* NAV */
nav {
  padding: 20px;
  text-align:center;
  border-bottom:1px solid var(--border);
}
nav h2 {
  color: var(--gold);
  font-family: 'Cinzel';
}

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px;
}
.hero h1 {
  font-size:40px;
}
.hero span {
  color: var(--gold);
}

/* FORM */
.container {
  max-width:600px;
  margin: auto;
  padding:20px;
}

.card {
  border:1px solid var(--border);
  padding:20px;
  border-radius:8px;
  background:#0c0f16;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  margin-bottom:15px;
  background:#111;
  border:1px solid var(--border);
  color:white;
}

input:focus, textarea:focus {
  outline:none;
  border-color: var(--gold);
}

button {
  background:var(--gold);
  border:none;
  padding:10px 20px;
  cursor:pointer;
}

/* SUCCESS */
#success {
  display:none;
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- CURSOR -->
<div id="cur"></div>
<div id="cur-r"></div>

<nav>
  <h2>Rotaract WebTech</h2>
</nav>

<section class="hero">
  <h1>Feedback <span>Form</span></h1>
  <p>We value your feedback</p>
</section>

<div class="container">
  <div class="card">

    <label>Name</label>
    <input type="text" id="name" placeholder="Enter your name">

    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">

    <label>Message</label>
    <textarea id="message" placeholder="Your feedback"></textarea>

    <button onclick="submitForm()">Submit</button>

    <div id="success">
      <h3>✅ Submitted Successfully!</h3>
    </div>

  </div>
</div>

<script>
/* CURSOR MOVEMENT */
const cur = document.getElementById("cur");
const curR = document.getElementById("cur-r");

document.addEventListener("mousemove", (e) => {
  cur.style.left = e.clientX + "px";
  cur.style.top = e.clientY + "px";

  curR.style.left = e.clientX + "px";
  curR.style.top = e.clientY + "px";
});

/* FORM */
function submitForm(){
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let message = document.getElementById("message").value;

  if(name === "" || email === "" || message === ""){
    alert("Please fill all fields");
    return;
  }

  document.getElementById("success").style.display = "block";
}
</script>

</body>
</html>
